<div class="login-page">
    <div class="welcome-side">
        <h1>Hello, Welcome </h1>
    <h2>Manage your inventory efficiently and easily.</h2>
    <p>Enjoy an easy to use inventory system for the management of 
        your business products.</p>
</div>

    <div class="login-box"  [ngClass]="{ 'shake' : shake }" >
        
    <h2>Inventory System</h2>
    <p>Enter your account details</p>
<div class="input-group">
    <input type="text" placeholder="Enter Username" [(ngModel)]="username"  (input)="usernameError = ''"  [class.invalid]="usernameError">
    <i class="fas fa-user"></i>
    </div>
    <div class="error" *ngIf="usernameError">{{ usernameError }}</div>

<div class="input-group">
    <input type="password" placeholder="Enter Password" [(ngModel)]="password"   (input)="passwordError = ''"  [class.invalid]="passwordError">
    <i class="fas fa-lock"></i>
    </div>
    <div class="error" *ngIf="passwordError">{{ passwordError }}</div>

<button (click)="login()">Login</button>


<div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
</div>
</div>
