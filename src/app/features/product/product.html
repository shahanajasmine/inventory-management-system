<div class="dashboard-header">
  <h2>
    <i class="fas fa-box"></i> Inventory Dashboard</h2>

  <button (click)="logout()" class="btn-logout">
    <i class="fas fa-sign-out-alt"></i> Logout
  </button>
</div>

<hr>
<h3>Add New Product</h3>
<div>
  <input
    type="text"
    placeholder="Product Name"
    [(ngModel)]="newName">
  <input
    type="text"
    placeholder="Category"
    [(ngModel)]="newCategory">
   <input
    type="number"
    placeholder="Stock"
    [(ngModel)]="newStock"> 
  <input
    type="number"
    placeholder="Price"
    [(ngModel)]="newPrice">
    
  <button (click)="addProduct()" class="btn-add">
    <i class="fas fa-plus"></i>
    {{ editIndex !== null ? 'Update' : 'Add'}}
     
  </button>
  </div>

  <br>
  <input type="text" placeholder="Search product..." [(ngModel)]="searchText">
  <br><br>

<table class="product-table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Category</th>
      <th>Stock</th>
      <th>Price</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let product of  filteredProducts; let i = index">
      <td>{{ product.name }}</td>
      <td>{{ product.category }}</td>
      <td [style.color]="product.stock < 10 ? 'red' : 'black'" >
      {{ product.stock }}
      </td>
      <td>{{ product.price }}</td>
      <td>

        <button (click)="editProduct(i)" class="btn-edit">Edit</button>
        <button (click)="deleteProduct(i)" class="btn-delete">
          <i class="fas fa-trash"></i> Delete
        </button>
      </td>
    </tr>
  </tbody>
</table>

<div *ngIf="filteredProducts.length === 0">
  No product found
</div>
